<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH Board Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
        <div class="font-bold text-lg">BCH Management</div>
        <div id="userInfo" class="text-sm hidden">
            <span id="displayRole" class="mr-2 px-2 py-1 bg-blue-600 rounded text-xs"></span>
            <span id="displayName" class="mr-4"></span>
            <button onclick="logout()" class="text-red-300 hover:text-red-100 font-semibold">ออกจากระบบ</button>
        </div>
    </nav>

    <div id="pageLogin" class="container mx-auto p-4 mt-10 max-w-sm">
        <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-800">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">เข้าสู่ระบบ</h2>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">เบอร์โทรศัพท์ (Login)</label>
                <input type="tel" id="loginPhone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500" placeholder="08XXXXXXXX">
            </div>
            <button onclick="login()" class="w-full bg-blue-800 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="pageAdmin" class="container mx-auto p-4 mt-4 hidden-page max-w-2xl">
        <h2 class="text-xl font-bold mb-4">เมนูสำหรับผู้ดูแลระบบ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button onclick="showSection('sectionMeeting')" class="bg-white p-6 rounded-lg shadow hover:shadow-md border-l-4 border-blue-500 font-semibold text-left">📝 จองนัดประชุม</button>
            <button onclick="showSection('sectionCar')" class="bg-white p-6 rounded-lg shadow hover:shadow-md border-l-4 border-green-500 font-semibold text-left">🚐 จองรถรับ-ส่ง</button>
            <button onclick="showSection('sectionHotel')" class="bg-white p-6 rounded-lg shadow hover:shadow-md border-l-4 border-purple-500 font-semibold text-left">🏨 จองห้องพัก</button>
        </div>

        <div id="sectionMeeting" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page">
            <h3 class="font-bold text-lg mb-4 text-blue-800">ระบบจองนัดการประชุม</h3>
            <div class="grid grid-cols-1 gap-4">
                <div><label class="block text-sm">วันที่</label><input type="date" id="mDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm">เวลา</label><input type="time" id="mTime" class="w-full border p-2 rounded"></div>
                <div>
                    <label class="block text-sm">ประเภท</label>
                    <select id="mType" class="w-full border p-2 rounded">
                        <option>ต่อรองจัดซื้อ</option><option>ต่อรองจัดจ้าง</option><option>พิจารณา TOR จัดซื้อ</option>
                        <option>พิจารณา TOR จัดจ้าง</option><option>เปิดซอง</option><option>ตรวจรับ</option>
                        <option>ก่อสร้าง</option><option>Board สามัญ</option><option>Board วิสามัญ</option><option>อื่นๆ</option>
                    </select>
                </div>
                <div><label class="block text-sm">รายละเอียด</label><input type="text" id="mDetails" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm">วงเงิน (บาท)</label><input type="number" id="mBudget" class="w-full border p-2 rounded"></div>
                <div>
                    <label class="block text-sm mb-1">รายชื่อผู้เข้าร่วม (เลือกได้หลายคน)</label>
                    <div class="h-40 overflow-y-scroll border p-2 rounded text-sm bg-gray-50" id="participantList">
                        </div>
                </div>
                <div><label class="block text-sm">หมายเหตุ</label><input type="text" id="mNote" class="w-full border p-2 rounded"></div>
                <button onclick="saveMeeting()" class="bg-blue-600 text-white p-2 rounded font-bold w-full mt-2">บันทึกข้อมูลประชุม</button>
            </div>
        </div>
        
        </div>

    <div id="pageUser" class="container mx-auto p-4 mt-4 hidden-page max-w-4xl">
        <h2 class="text-xl font-bold mb-4 text-gray-800">ตารางการประชุมของท่าน</h2>
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div id="userSchedule" class="divide-y divide-gray-200">
                <div class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</div>
            </div>
        </div>
    </div>

    <script>
        // *** ใส่ URL WEB APP ที่ได้จากขั้นตอนที่ 2 ตรงนี้ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzSUxpY-Kv73916tdWRRgwI9qMqfPURWp2qbaou8vgEHk_fr3ekfIBk6dRz0BCcZPzoAQ/exec"; 

        // รายชื่อตั้งต้น
        const defaultParticipants = [
            "คุณพงศธร คุณานุสรณ์", "ศจ.ดร.เสมอใจ ศรีมาลา", "ผป.วิชัย จิตรถเวช", 
            "นายโซวัน โล", "ผป.บุญชัย เด่นสกุล", "คุณอภิศักดิ์ ก้องกังวาฬโชค", 
            "ผป.นพ.เอกลาภ ทองบริสุทธิ์", "นพ.ชูศักดิ์ วงศ์สุรีย์", "นพ.ยุทธศักดิ์ วงศ์สุรีย์", 
            "นพ.ยุคลพรรษ สกุลกัน", "ภญ.สิริพร กัลชาญพิเศษ", "นางเกตุแก้ว หวัง", 
            "นายปิยะ นันตาฤทธานนท์", "นางรัชนี โสรัจจวัฒน์", "นายศุภชัย อรุณรักถาวร"
        ];

        // เมื่อเปิดหน้าเว็บ
        window.onload = function() {
            renderParticipants();
            checkLoginStatus();
        }

        function renderParticipants() {
            const list = document.getElementById('participantList');
            let html = '';
            defaultParticipants.forEach(name => {
                html += `<label class="flex items-center space-x-2 mb-1 cursor-pointer hover:bg-gray-100 p-1 rounded">
                            <input type="checkbox" value="${name}" class="chk-participant rounded text-blue-600">
                            <span>${name}</span>
                         </label>`;
            });
            list.innerHTML = html;
        }

        function checkLoginStatus() {
            const userStr = localStorage.getItem('bch_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('displayName').innerText = user.name;
                document.getElementById('displayRole').innerText = user.role.toUpperCase();
                document.getElementById('userInfo').classList.remove('hidden');
                
                document.getElementById('pageLogin').classList.add('hidden-page');
                
                if (user.role === 'admin') {
                    document.getElementById('pageAdmin').classList.remove('hidden-page');
                } else {
                    document.getElementById('pageUser').classList.remove('hidden-page');
                    loadUserMeetings(user.name);
                }
            } else {
                document.getElementById('pageLogin').classList.remove('hidden-page');
                document.getElementById('pageAdmin').classList.add('hidden-page');
                document.getElementById('pageUser').classList.add('hidden-page');
                document.getElementById('userInfo').classList.add('hidden');
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value;
            if(!phone) return Swal.fire('แจ้งเตือน', 'กรุณากรอกเบอร์โทรศัพท์', 'warning');

            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', phone: phone })
                }).then(r => r.json());

                if (res.success) {
                    localStorage.setItem('bch_user', JSON.stringify(res.data));
                    Swal.close();
                    checkLoginStatus();
                } else {
                    Swal.fire('ผิดพลาด', res.message, 'error');
                }
            } catch (err) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('bch_user');
            checkLoginStatus();
        }

        function showSection(sectionId) {
            document.getElementById('sectionMeeting').classList.add('hidden-page');
            document.getElementById(sectionId).classList.remove('hidden-page');
        }

        async function saveMeeting() {
            // รวบรวมรายชื่อผู้เข้าร่วมที่ถูกติ๊ก
            let selected = [];
            document.querySelectorAll('.chk-participant:checked').forEach(chk => selected.push(chk.value));
            
            const payload = {
                action: 'saveMeeting',
                date: document.getElementById('mDate').value,
                time: document.getElementById('mTime').value,
                type: document.getElementById('mType').value,
                details: document.getElementById('mDetails').value,
                budget: document.getElementById('mBudget').value,
                participants: selected.join(', '),
                note: document.getElementById('mNote').value
            };

            if(!payload.date || !payload.time) return Swal.fire('แจ้งเตือน', 'กรุณากรอกวันที่และเวลา', 'warning');

            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
            
            if(res.success) {
                Swal.fire('สำเร็จ', res.message, 'success');
                // ล้างฟอร์ม
                document.querySelectorAll('#sectionMeeting input').forEach(inp => inp.value = '');
                document.querySelectorAll('.chk-participant').forEach(chk => chk.checked = false);
            }
        }

        async function loadUserMeetings(userName) {
            const container = document.getElementById('userSchedule');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getUserMeetings', name: userName })
                }).then(r => r.json());

                if (res.success && res.data.length > 0) {
                    let html = '';
                    res.data.forEach(m => {
                        // สร้าง Link สำหรับ Add to Google Calendar
                        const startDateTime = m.date.replace(/-/g, '') + 'T' + m.time.replace(':', '') + '00';
                        const calLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('ประชุม ' + m.type)}&dates=${startDateTime}/${startDateTime}&details=${encodeURIComponent(m.details + '\nหมายเหตุ: ' + m.note)}`;

                        html += `
                        <div class="p-4 hover:bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center">
                            <div>
                                <p class="font-bold text-blue-800 text-lg">${m.date} <span class="text-gray-500 text-sm ml-2">🕒 ${m.time} น.</span></p>
                                <p class="text-gray-800 mt-1"><span class="font-semibold">ประเภท:</span> ${m.type}</p>
                                <p class="text-gray-600 text-sm mt-1">${m.details} (วงเงิน: ${m.budget} บ.)</p>
                                ${m.note ? `<p class="text-red-500 text-xs mt-1">* ${m.note}</p>` : ''}
                            </div>
                            <a href="${calLink}" target="_blank" class="mt-3 sm:mt-0 bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-2 rounded shadow-sm text-sm font-semibold flex items-center">
                                📅 บันทึกลงปฏิทิน
                            </a>
                        </div>`;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div class="p-8 text-center text-gray-500">ไม่มีนัดหมายการประชุมในขณะนี้</div>`;
                }
            } catch(e) {
                container.innerHTML = `<div class="p-8 text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</div>`;
            }
        }
    </script>
</body>
</html>
