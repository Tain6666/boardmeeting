<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH Board Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .hidden-page { display: none; }
        
        /* ตั้งค่าตอนกดพิมพ์เอกสาร */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .container { max-width: 100%; margin: 0; padding: 0; }
            .shadow, .shadow-md, .shadow-lg { box-shadow: none !important; }
            .print-border { border: 1px solid #ddd; }
        }
    </style>
</head>
<body class="text-gray-800 pb-10">

    <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50 no-print">
        <div class="font-bold text-lg">BCH Management</div>
        <div id="userInfo" class="text-sm hidden flex items-center">
            <span id="displayRole" class="mr-2 px-2 py-1 bg-blue-600 rounded text-xs uppercase hidden sm:inline-block"></span>
            <span id="displayName" class="mr-4 font-semibold"></span>
            <button onclick="logout()" class="text-red-200 hover:text-white font-semibold bg-red-600 px-3 py-1 rounded">ออก</button>
        </div>
    </nav>

    <div id="pageLogin" class="container mx-auto p-4 mt-10 max-w-sm no-print">
        <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-800">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">เข้าสู่ระบบ</h2>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">เบอร์โทรศัพท์</label>
                <input type="tel" id="loginPhone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500" placeholder="08XXXXXXXX">
            </div>
            <button onclick="login()" class="w-full bg-blue-800 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition shadow-md">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="pageAdmin" class="container mx-auto p-4 mt-4 hidden-page max-w-5xl">
        <h2 class="text-xl font-bold mb-4 no-print">เมนูสำหรับผู้ดูแลระบบ</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
            <button onclick="showSection('sectionMeeting')" class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 font-semibold text-left">📝 จองประชุม</button>
            <button onclick="showSection('sectionCar')" class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500 font-semibold text-left">🚐 จองรถรับ-ส่ง</button>
            <button onclick="showSection('sectionHotel')" class="bg-white p-4 rounded-lg shadow border-l-4 border-purple-500 font-semibold text-left">🏨 จองห้องพัก</button>
            <button onclick="showSection('sectionDashboard')" class="bg-blue-800 text-white p-4 rounded-lg shadow font-semibold text-left">📊 Dashboard</button>
        </div>

        <div id="sectionMeeting" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-blue-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-blue-800">📝 ระบบจองนัดการประชุม</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">วันที่</label><input type="date" id="mDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลาเริ่ม</label><input type="time" id="mStartTime" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลาสิ้นสุด</label><input type="time" id="mEndTime" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">ประเภท</label><select id="mType" class="w-full border p-2 rounded"><option>ต่อรองจัดซื้อ</option><option>ต่อรองจัดจ้าง</option><option>พิจารณา TOR จัดซื้อ</option><option>พิจารณา TOR จัดจ้าง</option><option>เปิดซอง</option><option>ตรวจรับ</option><option>ก่อสร้าง</option><option>Board สามัญ</option><option>Board วิสามัญ</option><option>อื่นๆ</option></select></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">รายละเอียด</label><input type="text" id="mDetails" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">วงเงิน (บาท)</label><input type="number" id="mBudget" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">รายชื่อผู้เข้าร่วม</label><div class="h-48 overflow-y-scroll border p-3 rounded text-sm bg-gray-50 grid grid-cols-1 md:grid-cols-2 gap-2" id="participantList"></div></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="mNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveMeeting()" class="bg-blue-600 text-white p-3 rounded-lg font-bold w-full">บันทึกข้อมูลประชุม</button></div>
            </div>
        </div>

        <div id="sectionCar" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-green-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-green-700">🚐 ระบบจองรถรับ-ส่ง</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-semibold mb-1">วันที่ใช้รถ</label><input type="date" id="cBookingDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลารับ</label><input type="time" id="cPickupTime" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">สถานที่รับ</label><input type="text" id="cPickupLocation" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">สถานที่ส่ง</label><input type="text" id="cDropoffLocation" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">ผู้เดินทาง (ใคร)</label><input type="text" id="cWho" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">จำนวนคน</label><input type="number" id="cPax" class="w-full border p-2 rounded" min="1" value="1"></div>
                <div><label class="block text-sm font-semibold mb-1">เบอร์ติดต่อ</label><input type="tel" id="cContact" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="cNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveCar()" class="bg-green-600 text-white p-3 rounded-lg font-bold w-full">บันทึกการจองรถ</button></div>
            </div>
        </div>

        <div id="sectionHotel" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-purple-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-purple-700">🏨 ระบบจองห้องพัก</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-semibold mb-1">วันที่ทำรายการ</label><input type="date" id="hBookingDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">สถานที่พัก</label><select id="hLocation" class="w-full border p-2 rounded"><option value="">-- เลือกสถานที่ --</option><option value="หอพักหมอหลุยส์">หอพักหมอหลุยส์</option><option value="เพิ่มอิสระ">เพิ่มอิสระ</option></select></div>
                <div><label class="block text-sm font-semibold mb-1">ผู้เข้าพัก (ใคร)</label><input type="text" id="hWho" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">จำนวนคน</label><input type="number" id="hPax" class="w-full border p-2 rounded" min="1" value="1"></div>
                <div><label class="block text-sm font-semibold mb-1">เช็คอิน (วันเข้า)</label><input type="date" id="hCheckIn" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เช็คเอาท์ (วันออก)</label><input type="date" id="hCheckOut" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เบอร์ติดต่อ</label><input type="tel" id="hContact" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="hNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveHotel()" class="bg-purple-600 text-white p-3 rounded-lg font-bold w-full">บันทึกการจองห้องพัก</button></div>
            </div>
        </div>

        <div id="sectionDashboard" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page print-border">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 no-print">
                <h3 class="font-bold text-2xl text-blue-800">📊 รายงานสรุปข้อมูล</h3>
                <div class="flex gap-2 mt-4 sm:mt-0">
                    <select id="dbFilterType" onchange="toggleDateInput()" class="border p-2 rounded">
                        <option value="daily">รายวัน</option>
                        <option value="monthly">รายเดือน</option>
                    </select>
                    <input type="date" id="dbDateTarget" class="border p-2 rounded">
                    <input type="month" id="dbMonthTarget" class="border p-2 rounded hidden-page">
                    <button onclick="loadDashboard()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">🔍 ค้นหา</button>
                    <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded font-bold">🖨️ พิมพ์</button>
                </div>
            </div>

            <div class="hidden print:block text-center mb-6">
                <h2 class="text-2xl font-bold">รายงานสรุปข้อมูลโรงพยาบาลกรุงเทพคริสเตียน</h2>
                <p id="printDateHeader" class="text-lg mt-2"></p>
            </div>

            <div id="dashboardResults" class="space-y-8">
                <div class="text-center text-gray-400 py-10">กรุณาเลือกวันที่/เดือน และกดปุ่มค้นหา</div>
            </div>
        </div>
    </div>

    <div id="pageUser" class="container mx-auto p-4 mt-4 hidden-page max-w-4xl no-print">
        <h2 class="text-xl font-bold mb-4 text-gray-800 border-l-4 border-blue-800 pl-3">ตารางการประชุมของท่าน</h2>
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div id="userSchedule" class="divide-y divide-gray-200">
                <div class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</div>
            </div>
        </div>
    </div>

    <script>
        // *** เปลี่ยน URL ตรงนี้ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzSUxpY-Kv73916tdWRRgwI9qMqfPURWp2qbaou8vgEHk_fr3ekfIBk6dRz0BCcZPzoAQ/exec"; 

        window.userMeetingData = [];
        const defaultParticipants = [ "คุณพงศธร คุณานุสรณ์", "ศจ.ดร.เสมอใจ ศรีมาลา", "ผป.วิชัย จิตรถเวช", "นายโซวัน โล", "ผป.บุญชัย เด่นสกุล", "คุณอภิศักดิ์ ก้องกังวาฬโชค", "ผป.นพ.เอกลาภ ทองบริสุทธิ์", "นพ.ชูศักดิ์ วงศ์สุรีย์", "นพ.ยุทธศักดิ์ วงศ์สุรีย์", "นพ.ยุคลพรรษ สกุลกัน", "ภญ.สิริพร กัลชาญพิเศษ", "นางเกตุแก้ว หวัง", "นายปิยะ นันตาฤทธานนท์", "นางรัชนี โสรัจจวัฒน์", "นายศุภชัย อรุณรักถาวร" ];

        window.onload = function() {
            renderParticipants();
            checkLoginStatus();
            // ตั้งค่าวันที่ปัจจุบันให้ Dashboard
            document.getElementById('dbDateTarget').valueAsDate = new Date();
            let today = new Date();
            document.getElementById('dbMonthTarget').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
        }

        // [ฟังก์ชัน renderParticipants, checkLoginStatus, login, logout, saveMeeting, saveCar, saveHotel เหมือนเดิมทุกประการครับ ผมละไว้เพื่อไม่ให้โค้ดยาวเกินไป]
        function renderParticipants() { const list = document.getElementById('participantList'); let html = ''; defaultParticipants.forEach(name => { html += `<label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer transition"><input type="checkbox" value="${name}" class="chk-participant rounded text-blue-600 w-4 h-4"><span class="text-gray-700">${name}</span></label>`; }); list.innerHTML = html; }
        function checkLoginStatus() { const userStr = localStorage.getItem('bch_user'); if (userStr) { const user = JSON.parse(userStr); document.getElementById('displayName').innerText = user.name; document.getElementById('displayRole').innerText = user.role; document.getElementById('userInfo').classList.remove('hidden'); document.getElementById('pageLogin').classList.add('hidden-page'); if (user.role === 'admin') { document.getElementById('pageAdmin').classList.remove('hidden-page'); } else { document.getElementById('pageUser').classList.remove('hidden-page'); loadUserMeetings(user.name); } } else { document.getElementById('pageLogin').classList.remove('hidden-page'); document.getElementById('pageAdmin').classList.add('hidden-page'); document.getElementById('pageUser').classList.add('hidden-page'); document.getElementById('userInfo').classList.add('hidden'); } }
        async function login() { const phone = document.getElementById('loginPhone').value; if(!phone) return Swal.fire('แจ้ง', 'กรุณากรอกเบอร์', 'warning'); Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', phone: phone }) }).then(r => r.json()); if (res.success) { localStorage.setItem('bch_user', JSON.stringify(res.data)); Swal.close(); checkLoginStatus(); } else { Swal.fire('ผิดพลาด', res.message, 'error'); } } catch (err) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }
        function logout() { localStorage.removeItem('bch_user'); checkLoginStatus(); }
        function showSection(sectionId) { ['sectionMeeting','sectionCar','sectionHotel','sectionDashboard'].forEach(id => document.getElementById(id).classList.add('hidden-page')); document.getElementById(sectionId).classList.remove('hidden-page'); }

        async function saveMeeting() { let selected = []; document.querySelectorAll('.chk-participant:checked').forEach(chk => selected.push(chk.value)); const payload = { action: 'saveMeeting', date: document.getElementById('mDate').value, startTime: document.getElementById('mStartTime').value, endTime: document.getElementById('mEndTime').value, type: document.getElementById('mType').value, details: document.getElementById('mDetails').value, budget: document.getElementById('mBudget').value, participants: selected.join(', '), note: document.getElementById('mNote').value }; if(!payload.date || !payload.startTime || !payload.endTime) return Swal.fire('แจ้ง', 'กรอกวันที่ เวลาเริ่ม/จบ', 'warning'); Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); document.querySelectorAll('#sectionMeeting input').forEach(inp => inp.value = ''); document.querySelectorAll('.chk-participant').forEach(chk => chk.checked = false); } else { Swal.fire('ผิดพลาด', res.message, 'error'); } } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }
        async function saveCar() { const payload = { action: 'saveCar', bookingDate: document.getElementById('cBookingDate').value, pickupTime: document.getElementById('cPickupTime').value, pickupLocation: document.getElementById('cPickupLocation').value, dropoffLocation: document.getElementById('cDropoffLocation').value, who: document.getElementById('cWho').value, pax: document.getElementById('cPax').value, contact: document.getElementById('cContact').value, note: document.getElementById('cNote').value }; if(!payload.bookingDate || !payload.pickupLocation || !payload.dropoffLocation) return Swal.fire('แจ้ง', 'กรอกข้อมูลรับ-ส่งให้ครบ', 'warning'); Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); document.querySelectorAll('#sectionCar input').forEach(inp => { if(inp.type !== 'number') inp.value = ''; }); document.getElementById('cPax').value = 1; } } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }
        async function saveHotel() { const payload = { action: 'saveHotel', bookingDate: document.getElementById('hBookingDate').value, location: document.getElementById('hLocation').value, who: document.getElementById('hWho').value, pax: document.getElementById('hPax').value, checkIn: document.getElementById('hCheckIn').value, checkOut: document.getElementById('hCheckOut').value, contact: document.getElementById('hContact').value, note: document.getElementById('hNote').value }; if(!payload.location || !payload.checkIn || !payload.checkOut) return Swal.fire('แจ้ง', 'เลือกสถานที่และวันเข้าออก', 'warning'); Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); document.querySelectorAll('#sectionHotel input, #sectionHotel select').forEach(inp => { if(inp.type !== 'number') inp.value = ''; }); document.getElementById('hPax').value = 1; } } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }

        // --- โค้ด User Meetings (ปัญหาเรื่อง 17 นาทีจะหายไปเพราะ Backend ส่งค่าดิบมาแล้ว) ---
        async function loadUserMeetings(userName) {
            const container = document.getElementById('userSchedule');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getUserMeetings', name: userName }) }).then(r => r.json());
                if (res.success && res.data.length > 0) {
                    window.userMeetingData = res.data; 
                    let html = '';
                    res.data.forEach((m, index) => {
                        let sTime = m.startTime ? m.startTime.replace(':', '') + '00' : '000000';
                        let eTime = m.endTime ? m.endTime.replace(':', '') + '00' : sTime;
                        const startDateTime = m.date.replace(/-/g, '') + 'T' + sTime;
                        const endDateTime = m.date.replace(/-/g, '') + 'T' + eTime;
                        const calLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('ประชุม ' + m.type)}&dates=${startDateTime}/${endDateTime}&details=${encodeURIComponent(m.details + '\nหมายเหตุ: ' + m.note)}&ctz=Asia/Bangkok`;

                        html += `<div class="p-5 hover:bg-gray-50 flex flex-col md:flex-row justify-between items-start md:items-center border-b">
                            <div class="w-full md:w-2/3"><p class="font-bold text-blue-800 text-lg mb-1">📅 ${m.date}</p><p class="text-sm font-semibold text-gray-700 bg-gray-100 inline-block px-2 py-1 rounded">🕒 ${m.startTime} น. - ${m.endTime ? m.endTime + ' น.' : 'ไม่ระบุ'}</p><p class="text-gray-800 mt-2 truncate"><span class="font-semibold text-gray-600">ประเภท:</span> ${m.type}</p></div>
                            <div class="mt-4 md:mt-0 w-full md:w-1/3 flex flex-col sm:flex-row gap-2 justify-end"><button onclick="viewMeetingDetails(${index})" class="w-full sm:w-auto text-center bg-gray-200 text-gray-800 hover:bg-gray-300 px-4 py-2 rounded-lg shadow-sm text-sm font-bold transition">🔍 ดูข้อมูล</button><a href="${calLink}" target="_blank" class="w-full sm:w-auto text-center bg-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg shadow-sm text-sm font-bold transition">+ ปฏิทิน</a></div>
                        </div>`;
                    });
                    container.innerHTML = html;
                } else { container.innerHTML = `<div class="p-8 text-center text-gray-500">ไม่มีนัดหมายการประชุมในขณะนี้</div>`; }
            } catch(e) { container.innerHTML = `<div class="p-8 text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</div>`; }
        }

        function viewMeetingDetails(index) {
            const m = window.userMeetingData[index];
            if(!m) return;
            Swal.fire({
                title: 'รายละเอียดการประชุม',
                html: `<div class="text-left text-sm mt-4 bg-gray-50 p-4 rounded-lg border"><p class="mb-2"><strong class="text-blue-800">📅 วันที่:</strong> ${m.date}</p><p class="mb-2"><strong class="text-blue-800">🕒 เวลา:</strong> ${m.startTime} น. - ${m.endTime ? m.endTime + ' น.' : 'ไม่ระบุ'}</p><p class="mb-2"><strong class="text-blue-800">📌 ประเภท:</strong> ${m.type}</p><p class="mb-2"><strong class="text-blue-800">📝 รายละเอียด:</strong> ${m.details || '-'}</p><p class="mb-2"><strong class="text-blue-800">💰 วงเงิน:</strong> ${m.budget ? Number(m.budget).toLocaleString() + ' บาท' : '-'}</p><p class="mb-2"><strong class="text-red-600">⚠️ หมายเหตุ:</strong> ${m.note || '-'}</p></div>`,
                confirmButtonText: 'ปิด', confirmButtonColor: '#1e40af'
            });
        }

        // --- ระบบ Dashboard ---
        function toggleDateInput() {
            const type = document.getElementById('dbFilterType').value;
            if (type === 'daily') {
                document.getElementById('dbDateTarget').classList.remove('hidden-page');
                document.getElementById('dbMonthTarget').classList.add('hidden-page');
            } else {
                document.getElementById('dbDateTarget').classList.add('hidden-page');
                document.getElementById('dbMonthTarget').classList.remove('hidden-page');
            }
        }

        async function loadDashboard() {
            const type = document.getElementById('dbFilterType').value;
            const target = type === 'daily' ? document.getElementById('dbDateTarget').value : document.getElementById('dbMonthTarget').value;
            
            if(!target) return Swal.fire('แจ้งเตือน', 'กรุณาระบุวันที่หรือเดือนที่ต้องการดูรายงาน', 'warning');
        
        // อัปเดตหัวข้อตอน Print
        document.getElementById('printDateHeader').innerText = `ประจำ${type === 'daily' ? 'วัน' : 'เดือน'}ที่: ${target}`;

        Swal.fire({ title: 'กำลังดึงข้อมูล...', didOpen: () => Swal.showLoading() });

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getDashboardData', filterType: type, targetDate: target })
            }).then(r => r.json());

            if (res.success) {
                Swal.close();
                
                // เรียกฟังก์ชันสร้างตาราง โดยระบุลำดับคอลัมน์ที่ต้องการแสดง (เริ่มนับ 0 จากคอลัมน์ Timestamp)
                // Meeting ต้องการ: Date(1), StartTime(2), EndTime(3), Type(4), Details(5)
                renderDashboardTable('📝 การนัดประชุม', res.data.meeting, [1, 2, 3, 4, 5], ['วันที่', 'เวลาเริ่ม', 'เวลาจบ', 'ประเภท', 'รายละเอียด'], 'blue');
                
                // Car ต้องการ: BookingDate(1), PickupTime(2), PickupLocation(3), Who(4), Contact(7)
                renderDashboardTable('🚐 การจองรถรับ-ส่ง', res.data.car, [1, 2, 3, 4, 7], ['วันที่', 'เวลารับ', 'สถานที่รับ', 'ผู้เดินทาง', 'ติดต่อ'], 'green');
                
                // Hotel ต้องการ: BookingDate(1), Location(2), CheckIn(5), CheckOut(6), Who(3)
                renderDashboardTable('🏨 การจองห้องพัก', res.data.hotel, [1, 2, 5, 6, 3], ['วันที่จอง', 'สถานที่พัก', 'วันเข้า', 'วันออก', 'ผู้เข้าพัก'], 'purple');
            } else { 
                Swal.fire('ผิดพลาด', res.message, 'error'); 
            }
        } catch(e) { 
            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error'); 
        }
    }

    function renderDashboardTable(title, dataArray, columnIndices, headers, colorTheme) {
        const container = document.getElementById('dashboardResults');
        if(container.innerHTML.includes("กรุณาเลือกวันที่")) container.innerHTML = ''; // ล้างข้อความตั้งต้น

        let html = `<div class="mb-8"><h4 class="font-bold text-lg text-${colorTheme}-700 border-b-2 border-${colorTheme}-500 mb-3 pb-1">${title} (รวม ${dataArray.length} รายการ)</h4>`;
        
        if(dataArray.length === 0) {
            html += `<p class="text-gray-500 text-sm italic bg-gray-50 p-4 rounded text-center">ไม่มีข้อมูลในวัน/เดือน ที่เลือก</p></div>`;
        } else {
            html += `<div class="overflow-x-auto shadow-sm rounded-lg"><table class="min-w-full text-sm text-left bg-white"><thead class="bg-${colorTheme}-100 text-${colorTheme}-800"><tr>`;
            headers.forEach(h => html += `<th class="px-4 py-3 font-semibold border-b border-${colorTheme}-200">${h}</th>`);
            html += `</tr></thead><tbody class="divide-y divide-gray-200">`;
            
            // วนลูปดึงข้อมูลตามลำดับ Index (Array แบบตัวเลข) แทนการใช้ชื่อ Header
            dataArray.forEach(row => {
                html += `<tr class="hover:bg-gray-50">`;
                columnIndices.forEach(idx => {
                    let cellValue = row[idx] ? row[idx].toString().substring(0, 50) : '-'; // ตัดข้อความถ้ามันยาวเกินไป
                    html += `<td class="px-4 py-3">${cellValue}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table></div></div>`;
        }
        
        // ถ้าตารางเป็นตารางแรก ให้แทนที่ ถ้าเป็นตารางถัดไปให้ต่อท้าย
        if (title.includes("ประชุม")) container.innerHTML = html;
        else container.insertAdjacentHTML('beforeend', html);
    }
    </script>
</body>
</html>
