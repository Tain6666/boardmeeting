<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH Board Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .hidden-page { display: none; }
        
        @media print {
            body * { visibility: hidden; }
            .print-area-active, .print-area-active * { visibility: visible; }
            .print-area-active { position: absolute; left: 0; top: 0; width: 100%; background: white;}
            .no-print { display: none !important; }
            .shadow, .shadow-md, .shadow-lg { box-shadow: none !important; }
            /* ป้องกันการตัดขาดครึ่งเวลาพิมพ์ */
            tr, img { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body class="text-gray-800 pb-10">

    <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50 no-print">
        <div class="font-bold text-lg">BCH Management</div>
        <div id="userInfo" class="text-sm hidden flex items-center">
            <span id="displayRole" class="mr-2 px-2 py-1 bg-blue-600 rounded text-xs uppercase hidden sm:inline-block"></span>
            <span id="displayName" class="mr-4 font-semibold"></span>
            <button onclick="logout()" class="text-red-200 hover:text-white font-semibold bg-red-600 px-3 py-1 rounded">ออก</button>
        </div>
    </nav>

    <div id="pageLogin" class="container mx-auto p-4 mt-10 max-w-sm no-print">
        <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-800">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">เข้าสู่ระบบ</h2>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">เบอร์โทรศัพท์</label>
                <input type="tel" id="loginPhone" class="w-full px-4 py-2 border rounded-lg" placeholder="08XXXXXXXX">
            </div>
            <button onclick="login()" class="w-full bg-blue-800 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition shadow-md">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="pageAdmin" class="container mx-auto p-4 mt-4 hidden-page max-w-5xl">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
            <button onclick="showSection('sectionMeeting')" class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 font-semibold text-left">📝 จองประชุม</button>
            <button onclick="showSection('sectionCar')" class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500 font-semibold text-left">🚐 จองรถรับ-ส่ง</button>
            <button onclick="showSection('sectionHotel')" class="bg-white p-4 rounded-lg shadow border-l-4 border-purple-500 font-semibold text-left">🏨 จองห้องพัก</button>
            <button onclick="showSection('sectionDashboard')" class="bg-blue-800 text-white p-4 rounded-lg shadow font-semibold text-left">📊 Dashboard</button>
        </div>

        <div id="sectionMeeting" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-blue-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-blue-800">📝 ระบบจองนัดการประชุม</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">วันที่</label><input type="date" id="mDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลาเริ่ม</label><input type="time" id="mStartTime" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลาสิ้นสุด</label><input type="time" id="mEndTime" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">ประเภท</label><select id="mType" class="w-full border p-2 rounded"><option>ต่อรองจัดซื้อ</option><option>ต่อรองจัดจ้าง</option><option>พิจารณา TOR จัดซื้อ</option><option>พิจารณา TOR จัดจ้าง</option><option>เปิดซอง</option><option>ตรวจรับ</option><option>ก่อสร้าง</option><option>Board สามัญ</option><option>Board วิสามัญ</option><option>อื่นๆ</option></select></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">รายละเอียด</label><input type="text" id="mDetails" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">วงเงิน (บาท)</label><input type="number" id="mBudget" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-1">รายชื่อผู้เข้าร่วม</label>
                    <div class="h-48 overflow-y-scroll border p-3 rounded text-sm bg-gray-50 grid grid-cols-1 md:grid-cols-2 gap-2 mb-2" id="participantList"></div>
                    <div class="flex gap-2">
                        <input type="text" id="customName" class="w-full border p-2 rounded text-sm" placeholder="พิมพ์ชื่อบุคคลอื่นเพื่อเพิ่มลงในรายการ...">
                        <button onclick="addCustomName()" class="bg-blue-600 text-white px-4 rounded font-bold hover:bg-blue-700">+</button>
                    </div>
                </div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="mNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveMeeting()" class="bg-blue-600 text-white p-3 rounded-lg font-bold w-full">บันทึกข้อมูลประชุม</button></div>
            </div>
        </div>

        <div id="sectionCar" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-green-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-green-700">🚐 ระบบจองรถรับ-ส่ง</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-semibold mb-1">วันที่ใช้รถ</label><input type="date" id="cBookingDate" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เวลารับ</label><input type="time" id="cPickupTime" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">สถานที่รับ</label><input type="text" id="cPickupLocation" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">สถานที่ส่ง</label><input type="text" id="cDropoffLocation" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">ผู้เดินทาง (ใคร)</label><input type="text" id="cWho" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">จำนวนคน</label><input type="number" id="cPax" class="w-full border p-2 rounded" min="1" value="1"></div>
                <div><label class="block text-sm font-semibold mb-1">เบอร์ติดต่อ</label><input type="tel" id="cContact" class="w-full border p-2 rounded" placeholder="08XXXXXXXX"></div>
                <div><label class="block text-sm font-semibold mb-1">แนบรูปภาพ</label><input type="file" id="cImage" accept="image/*" class="w-full border p-1 rounded bg-white"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="cNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveCar()" class="bg-green-600 text-white p-3 rounded-lg font-bold w-full">บันทึกการจองรถ</button></div>
            </div>
        </div>

        <div id="sectionHotel" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page border-t-4 border-purple-500 no-print">
            <h3 class="font-bold text-lg mb-4 text-purple-700">🏨 ระบบจองห้องพัก</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-1">สถานที่พัก</label>
                    <input type="text" list="hotelList" id="hLocation" class="w-full border p-2 rounded" placeholder="เลือกจากรายการ หรือ พิมพ์ชื่อสถานที่ใหม่...">
                    <datalist id="hotelList"><option value="หอพักหมอหลุยส์"><option value="เพิ่มอิสระ"></datalist>
                </div>
                <div><label class="block text-sm font-semibold mb-1">ผู้เข้าพัก (ใคร)</label><input type="text" id="hWho" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">จำนวนคน</label><input type="number" id="hPax" class="w-full border p-2 rounded" min="1" value="1"></div>
                <div><label class="block text-sm font-semibold mb-1">เช็คอิน (วันเข้า)</label><input type="date" id="hCheckIn" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เช็คเอาท์ (วันออก)</label><input type="date" id="hCheckOut" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-semibold mb-1">เบอร์ติดต่อ</label><input type="tel" id="hContact" class="w-full border p-2 rounded" placeholder="08XXXXXXXX"></div>
                <div class="md:col-span-2"><label class="block text-sm font-semibold mb-1">หมายเหตุ</label><input type="text" id="hNote" class="w-full border p-2 rounded"></div>
                <div class="md:col-span-2 mt-2"><button onclick="saveHotel()" class="bg-purple-600 text-white p-3 rounded-lg font-bold w-full">บันทึกการจองห้องพัก</button></div>
            </div>
        </div>

        <div id="sectionDashboard" class="bg-white p-6 rounded-lg shadow mt-6 hidden-page">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 no-print gap-2">
                <h3 class="font-bold text-2xl text-blue-800">📊 สรุปข้อมูลแอดมิน</h3>
                <div class="flex flex-wrap gap-2 justify-end w-full md:w-auto">
                    <select id="dbFilterType" onchange="toggleDateInput('db')" class="border p-2 rounded text-sm">
                        <option value="daily">รายวัน</option><option value="monthly">รายเดือน</option>
                    </select>
                    <input type="date" id="dbDateTarget" class="border p-2 rounded text-sm">
                    <input type="month" id="dbMonthTarget" class="border p-2 rounded text-sm hidden-page">
                    <button onclick="loadDashboard()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold text-sm shadow">🔍 ค้นหา</button>
                </div>
            </div>

            <div id="dashboardResults" class="space-y-8">
                <div class="text-center text-gray-400 py-10">กรุณาเลือกวันที่/เดือน และกดปุ่มค้นหา</div>
            </div>
        </div>
    </div>

    <div id="pageUser" class="container mx-auto p-4 mt-4 hidden-page max-w-4xl">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 no-print gap-4">
                <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-800 pl-3">ตารางการประชุม</h2>
                <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
                    <select id="uFilterType" onchange="toggleDateInput('u')" class="border p-2 rounded text-sm bg-gray-50">
                        <option value="yearly">รายปี</option><option value="monthly">รายเดือน</option>
                    </select>
                    <input type="month" id="uMonthTarget" class="border p-2 rounded text-sm hidden-page">
                    <input type="number" id="uYearTarget" class="border p-2 rounded text-sm w-24" placeholder="ปี ค.ศ.">
                    
                    <button onclick="triggerUserSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold text-sm shadow">🔍 ค้นหา</button>
                    <button onclick="printSpecificArea('userSchedule', 'ตารางการประชุมของท่าน')" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded font-bold text-sm shadow">🖨️ พิมพ์</button>
                </div>
            </div>
            <div id="userSchedule" class="overflow-hidden">
                <div class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</div>
            </div>
        </div>
    </div>

    <script>
        // *** เปลี่ยน URL ตรงนี้ด้วยนะครับ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzSUxpY-Kv73916tdWRRgwI9qMqfPURWp2qbaou8vgEHk_fr3ekfIBk6dRz0BCcZPzoAQ/exec"; 

        window.userMeetingData = [];
        // สร้างตัวแปรเก็บข้อมูลตารางไว้ทำ Popup
        window.dashboardDataTemp = {};
        window.dashboardColMap = {};

        const defaultParticipants = [ "คุณพงศธร คุณานุสรณ์", "ศจ.ดร.เสมอใจ ศรีมาลา", "ผป.วิชัย จิตรถเวช", "นายโซวัน โล", "ผป.บุญชัย เด่นสกุล", "คุณอภิศักดิ์ ก้องกังวาฬโชค", "ผป.นพ.เอกลาภ ทองบริสุทธิ์", "นพ.ชูศักดิ์ วงศ์สุรีย์", "นพ.ยุทธศักดิ์ วงศ์สุรีย์", "นพ.ยุคลพรรษ สกุลกัน", "ภญ.สิริพร กัลชาญพิเศษ", "นางเกตุแก้ว หวัง", "นายปิยะ นันตาฤทธานนท์", "นางรัชนี โสรัจจวัฒน์", "นายศุภชัย อรุณรักถาวร" ];

        function formatToDMMMYYYY(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            let d = new Date(dateStr);
            if (isNaN(d.getTime())) {
                let parts = dateStr.split('/');
                if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
            }
            if (!isNaN(d.getTime())) {
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            }
            return dateStr;
        }

        window.onload = function() {
            renderParticipants();
            let today = new Date();
            let y = today.getFullYear();
            let m = String(today.getMonth() + 1).padStart(2, '0');
            let d = String(today.getDate()).padStart(2, '0');
            
            document.getElementById('dbDateTarget').value = `${y}-${m}-${d}`;
            document.getElementById('dbMonthTarget').value = `${y}-${m}`;
            
            document.getElementById('uMonthTarget').value = `${y}-${m}`;
            document.getElementById('uYearTarget').value = y;
            document.getElementById('uFilterType').value = 'yearly';
            toggleDateInput('u'); 

            checkLoginStatus();
        }

        function addCustomName() {
            let name = document.getElementById('customName').value.trim();
            if(!name) return;
            let list = document.getElementById('participantList');
            let html = `<label class="flex items-center space-x-2 p-1 hover:bg-blue-50 bg-blue-100 rounded cursor-pointer transition"><input type="checkbox" value="${name}" class="chk-participant rounded text-blue-600 w-4 h-4" checked><span class="text-blue-800 font-semibold">${name} (เพิ่มใหม่)</span></label>`;
            list.insertAdjacentHTML('afterbegin', html);
            document.getElementById('customName').value = '';
        }

        function renderParticipants() { const list = document.getElementById('participantList'); let html = ''; defaultParticipants.forEach(name => { html += `<label class="flex items-center space-x-2 p-1 hover:bg-gray-200 rounded cursor-pointer transition"><input type="checkbox" value="${name}" class="chk-participant rounded text-blue-600 w-4 h-4"><span class="text-gray-700">${name}</span></label>`; }); list.innerHTML = html; }
        
        function checkLoginStatus() { 
            const userStr = localStorage.getItem('bch_user'); 
            if (userStr) { 
                const user = JSON.parse(userStr); 
                document.getElementById('displayName').innerText = user.name; 
                document.getElementById('displayRole').innerText = user.role; 
                document.getElementById('userInfo').classList.remove('hidden'); 
                document.getElementById('pageLogin').classList.add('hidden-page'); 
                if (user.role === 'admin') { document.getElementById('pageAdmin').classList.remove('hidden-page'); } 
                else { document.getElementById('pageUser').classList.remove('hidden-page'); triggerUserSearch(); } 
            } else { 
                document.getElementById('pageLogin').classList.remove('hidden-page'); 
                document.getElementById('pageAdmin').classList.add('hidden-page'); 
                document.getElementById('pageUser').classList.add('hidden-page'); 
                document.getElementById('userInfo').classList.add('hidden'); 
            } 
        }

        async function login() { const phone = document.getElementById('loginPhone').value; if(!phone) return Swal.fire('แจ้ง', 'กรุณากรอกเบอร์', 'warning'); Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', phone: phone }) }).then(r => r.json()); if (res.success) { localStorage.setItem('bch_user', JSON.stringify(res.data)); Swal.close(); checkLoginStatus(); } else { Swal.fire('ผิดพลาด', res.message, 'error'); } } catch (err) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }
        function logout() { localStorage.removeItem('bch_user'); checkLoginStatus(); }
        function showSection(sectionId) { ['sectionMeeting','sectionCar','sectionHotel','sectionDashboard'].forEach(id => document.getElementById(id).classList.add('hidden-page')); document.getElementById(sectionId).classList.remove('hidden-page'); }

        async function saveMeeting() { let selected = []; document.querySelectorAll('.chk-participant:checked').forEach(chk => selected.push(chk.value)); const payload = { action: 'saveMeeting', date: document.getElementById('mDate').value, startTime: document.getElementById('mStartTime').value, endTime: document.getElementById('mEndTime').value, type: document.getElementById('mType').value, details: document.getElementById('mDetails').value, budget: document.getElementById('mBudget').value, participants: selected.join(', '), note: document.getElementById('mNote').value }; if(!payload.date || !payload.startTime || !payload.endTime) return Swal.fire('แจ้ง', 'กรอกวันที่ เวลาเริ่ม/จบ', 'warning'); Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); document.querySelectorAll('#sectionMeeting input').forEach(inp => inp.value = ''); document.querySelectorAll('.chk-participant').forEach(chk => chk.checked = false); } else { Swal.fire('ผิดพลาด', res.message, 'error'); } } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }
        
        async function saveCar() { 
            const fileInput = document.getElementById('cImage');
            let base64Image = null; let fileName = null;
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0]; fileName = file.name;
                base64Image = await new Promise((resolve) => {
                    const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(file);
                });
            }
            const payload = { 
                action: 'saveCar', bookingDate: document.getElementById('cBookingDate').value, pickupTime: document.getElementById('cPickupTime').value, pickupLocation: document.getElementById('cPickupLocation').value, dropoffLocation: document.getElementById('cDropoffLocation').value, who: document.getElementById('cWho').value, pax: document.getElementById('cPax').value, contact: document.getElementById('cContact').value, note: document.getElementById('cNote').value, imageFile: base64Image, imageName: fileName
            }; 
            if(!payload.bookingDate || !payload.pickupLocation || !payload.dropoffLocation) return Swal.fire('แจ้ง', 'กรอกข้อมูลรับ-ส่งให้ครบ', 'warning'); 
            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); 
            try { 
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); 
                if(res.success) { 
                    Swal.fire('สำเร็จ', res.message, 'success'); 
                    document.querySelectorAll('#sectionCar input').forEach(inp => { if(inp.type !== 'number' && inp.type !== 'file') inp.value = ''; }); 
                    document.getElementById('cPax').value = 1; document.getElementById('cImage').value = '';
                } 
            } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } 
        }

        async function saveHotel() { const payload = { action: 'saveHotel', location: document.getElementById('hLocation').value, who: document.getElementById('hWho').value, pax: document.getElementById('hPax').value, checkIn: document.getElementById('hCheckIn').value, checkOut: document.getElementById('hCheckOut').value, contact: document.getElementById('hContact').value, note: document.getElementById('hNote').value }; if(!payload.location || !payload.checkIn || !payload.checkOut) return Swal.fire('แจ้ง', 'เลือกหรือพิมพ์สถานที่และวันเข้าออก', 'warning'); Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() }); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json()); if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); document.querySelectorAll('#sectionHotel input').forEach(inp => { if(inp.type !== 'number') inp.value = ''; }); document.getElementById('hPax').value = 1; } } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); } }

        function toggleDateInput(prefix) {
            const type = document.getElementById(prefix + 'FilterType').value;
            ['DateTarget', 'MonthTarget', 'YearTarget'].forEach(t => { let el = document.getElementById(prefix + t); if(el) el.classList.add('hidden-page'); });
            if (type === 'daily') { let d = document.getElementById(prefix + 'DateTarget'); if(d) d.classList.remove('hidden-page'); }
            else if (type === 'monthly') document.getElementById(prefix + 'MonthTarget').classList.remove('hidden-page');
            else if (type === 'yearly') document.getElementById(prefix + 'YearTarget').classList.remove('hidden-page');
        }

        function printSpecificArea(divId, title = '') {
            let target = document.getElementById(divId);
            target.classList.add('print-area-active');
            let titleEl = document.createElement('h2');
            titleEl.innerHTML = title;
            titleEl.className = "text-2xl font-bold mb-4 text-center hidden print:block";
            target.insertBefore(titleEl, target.firstChild);
            window.print();
            target.classList.remove('print-area-active');
            target.removeChild(titleEl);
        }

        function showLargeImage(url) {
            Swal.fire({ imageUrl: url, imageAlt: 'Attached Image', width: '80%', showConfirmButton: false, showCloseButton: true });
        }

        // --- ดูรายละเอียดเมื่อกดบนมือถือ (Admin Dashboard) ---
        function showRowDetails(idPrefix, rowIndex, title) {
            const row = window.dashboardDataTemp[idPrefix][rowIndex];
            const colMap = window.dashboardColMap[idPrefix];

            let html = '<div class="text-left text-sm mt-2 bg-gray-50 p-4 rounded-lg border space-y-2">';
            colMap.indices.forEach((idx, i) => {
                let val = row[idx] ? row[idx].toString() : '-';
                if (idx === 1 || (idPrefix === 'dbHotel' && (idx === 5 || idx === 6))) val = formatToDMMMYYYY(val);
                if (idPrefix === 'dbMeeting' && idx === 6 && val !== '-') val = Number(val).toLocaleString() + ' บาท';
                
                html += `<p><strong class="text-gray-800">${colMap.headers[i]}:</strong> <span class="text-gray-600">${val}</span></p>`;
            });
            html += '</div>';

            Swal.fire({ title: title, html: html, confirmButtonText: 'ปิด', confirmButtonColor: '#1f2937' });
        }

        async function loadDashboard() {
            const type = document.getElementById('dbFilterType').value;
            const target = type === 'daily' ? document.getElementById('dbDateTarget').value : document.getElementById('dbMonthTarget').value;
            if(!target) return Swal.fire('แจ้งเตือน', 'กรุณาระบุข้อมูลให้ครบ', 'warning');

            Swal.fire({ title: 'กำลังดึงข้อมูล...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardData', filterType: type, targetDate: target }) }).then(r => r.json());
                if (res.success) {
                    Swal.close();
                    document.getElementById('dashboardResults').innerHTML = ''; 
                    
                    // Meeting: เพิ่ม 8 (หมายเหตุ)
                    renderDashboardTable('dbMeeting', '📝 การนัดประชุม', res.data.meeting, [1, 2, 3, 4, 5, 6, 7, 8], ['วันที่', 'เวลาเริ่ม', 'เวลาจบ', 'ประเภท', 'รายละเอียด', 'วงเงิน', 'ผู้เข้าร่วม', 'หมายเหตุ'], 'blue');
                    
                    // Car: เพิ่ม 5 (จำนวนคน), 8 (หมายเหตุ) ให้แสดงครบตอนพิมพ์
                    renderDashboardTable('dbCar', '🚐 การจองรถรับ-ส่ง', res.data.car, [1, 2, 3, 6, 4, 5, 7, 8], ['วันที่', 'เวลารับ', 'สถานที่รับ', 'สถานที่ส่ง', 'ผู้เดินทาง', 'จำนวนคน', 'ติดต่อ', 'หมายเหตุ'], 'green');
                    
                    // Hotel: เพิ่ม 7 (เบอร์โทร), 8 (หมายเหตุ) ให้แสดงครบตอนพิมพ์
                    renderDashboardTable('dbHotel', '🏨 การจองห้องพัก', res.data.hotel, [2, 5, 6, 3, 4, 7, 8], ['สถานที่พัก', 'วันเข้า', 'วันออก', 'ผู้เข้าพัก', 'จำนวนคน', 'เบอร์โทร', 'หมายเหตุ'], 'purple');
                } else { Swal.fire('ผิดพลาด', res.message, 'error'); }
            } catch(e) { Swal.fire('ผิดพลาด', 'เชื่อมต่อไม่ได้', 'error'); }
        }

        // ระบบตารางแอดมิน ที่ซ่อนคอลัมน์บนมือถือ แต่โชว์หมดตอน Print
        function renderDashboardTable(idPrefix, title, dataArray, columnIndices, headers, colorTheme) {
            const container = document.getElementById('dashboardResults');
            let html = `<div id="${idPrefix}" class="mb-8 p-4 bg-white rounded-lg border">
                <div class="flex justify-between items-center border-b-2 border-${colorTheme}-500 mb-2 pb-1 no-print">
                    <h4 class="font-bold text-lg text-${colorTheme}-700">${title} <span class="text-gray-500 text-sm font-normal">(รวม ${dataArray.length} รายการ)</span></h4>
                    <button onclick="printSpecificArea('${idPrefix}', 'รายงาน: ${title}')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm font-bold shadow-sm">🖨️ พิมพ์</button>
                </div>
                <p class="text-xs text-gray-400 mb-2 no-print lg:hidden">💡 แตะที่รายการเพื่อดูรายละเอียดทั้งหมด</p>`;
            
            if(dataArray.length === 0) {
                html += `<p class="text-gray-500 text-sm italic bg-gray-50 p-4 rounded text-center">ไม่มีข้อมูล</p></div>`;
                container.insertAdjacentHTML('beforeend', html);
                return;
            }

            // เก็บข้อมูลไว้ทำ Popup ย่อขยาย
            window.dashboardColMap[idPrefix] = { indices: columnIndices, headers: headers };
            window.dashboardDataTemp[idPrefix] = dataArray;

            html += `<div class="overflow-x-auto"><table class="min-w-full text-sm text-left"><thead class="bg-${colorTheme}-100 text-${colorTheme}-800"><tr>`;
            
            // วนลูปสร้าง Header (คอลัมน์ที่ 4 เป็นต้นไป จะถูกซ่อนบนจอมือถือ แต่แสดงตอนพิมพ์)
            headers.forEach((h, i) => {
                let visibilityClass = i >= 3 ? 'hidden lg:table-cell print:table-cell' : 'table-cell';
                html += `<th class="px-3 py-3 font-semibold border-b ${visibilityClass}">${h}</th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-gray-200">`;
            
            dataArray.forEach((row, rowIndex) => {
                // เพิ่ม event onclick เพื่อกดดูรายละเอียด
                html += `<tr class="hover:bg-${colorTheme}-50 cursor-pointer transition" onclick="showRowDetails('${idPrefix}', ${rowIndex}, '${title}')">`;
                
                columnIndices.forEach((idx, i) => { 
                    let cellValue = row[idx] ? row[idx].toString() : '-';
                    if (idx === 1 || (idPrefix === 'dbHotel' && (idx === 5 || idx === 6))) cellValue = formatToDMMMYYYY(cellValue);
                    if (idPrefix === 'dbMeeting' && idx === 6 && cellValue !== '-') cellValue = Number(cellValue).toLocaleString();
                    
                    let visibilityClass = i >= 3 ? 'hidden lg:table-cell print:table-cell' : 'table-cell';
                    html += `<td class="px-3 py-3 border-b border-gray-100 ${visibilityClass}">${cellValue.substring(0, 100)}${cellValue.length > 100 ? '...' : ''}</td>`; 
                });
                html += `</tr>`;

                // จัดการรูปภาพ (คอลัมน์ 9 ของการจองรถ) ให้อยู่แถวใหม่
                if (idPrefix === 'dbCar' && row[9] && row[9].toString().startsWith('http')) {
                    html += `<tr>
                        <td colspan="${columnIndices.length}" class="p-0 border-b border-gray-300 bg-gray-50">
                            <img src="${row[9]}" alt="Car Attach" class="w-full object-contain max-h-[400px] cursor-pointer no-print" onclick="showLargeImage('${row[9]}'); event.stopPropagation();">
                            <img src="${row[9]}" alt="Car Attach" class="w-full object-contain hidden print:block">
                        </td>
                    </tr>`;
                }
            });
            html += `</tbody></table></div></div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        // --- ส่วน User Dashboard ---
        function downloadICS(title, rawDate, startTime, endTime, details) {
            let d = new Date(rawDate);
            if (isNaN(d.getTime())) { let parts = rawDate.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }
            if (isNaN(d.getTime())) d = new Date();

            let yyyy = d.getFullYear(); let mm = String(d.getMonth() + 1).padStart(2, '0'); let dd = String(d.getDate()).padStart(2, '0');
            let sTime = startTime ? startTime.replace(':', '') + '00' : '000000';
            let eTime = endTime ? endTime.replace(':', '') + '00' : sTime;

            let dtStart = `${yyyy}${mm}${dd}T${sTime}`; let dtEnd = `${yyyy}${mm}${dd}T${eTime}`;
            let icsMSG = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//BCH Management//TH\nBEGIN:VEVENT\n";
            icsMSG += "DTSTART;TZID=Asia/Bangkok:" + dtStart + "\nDTEND;TZID=Asia/Bangkok:" + dtEnd + "\n";
            icsMSG += "SUMMARY:" + title + "\nDESCRIPTION:" + details.replace(/\n/g, '\\n') + "\nEND:VEVENT\nEND:VCALENDAR";

            let blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            let url = window.URL.createObjectURL(blob); let a = document.createElement('a');
            a.href = url; a.download = 'Meeting_BCH.ics'; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        }

        async function triggerUserSearch() {
            const userStr = localStorage.getItem('bch_user');
            if(!userStr) return;
            const userName = JSON.parse(userStr).name;
            const type = document.getElementById('uFilterType').value;
            let target = '';
            
            if(type === 'monthly') target = document.getElementById('uMonthTarget').value;
            else if(type === 'yearly') target = document.getElementById('uYearTarget').value;

            if(!target) return Swal.fire('แจ้งเตือน', 'กรุณาระบุเดือน/ปี', 'warning');

            const container = document.getElementById('userSchedule');
            container.innerHTML = `<div class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</div>`;

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getUserMeetings', name: userName, filterType: type, targetDate: target }) }).then(r => r.json());

                if (res.success && res.data.length > 0) {
                    window.userMeetingData = res.data; 
                    let groupedData = {};
                    res.data.forEach(m => { m.displayDate = formatToDMMMYYYY(m.date); if(!groupedData[m.displayDate]) groupedData[m.displayDate] = []; groupedData[m.displayDate].push(m); });

                    let html = ''; let globalIndex = 0;

                    for(const [dateKey, meetings] of Object.entries(groupedData)) {
                        html += `<div class="bg-blue-50 text-blue-800 font-bold p-3 text-lg border-y mt-4 first:mt-0">📅 ${dateKey}</div>`;
                        
                        meetings.forEach((m) => {
                            let sTime = m.startTime ? m.startTime.replace(':', '') + '00' : '000000'; let eTime = m.endTime ? m.endTime.replace(':', '') + '00' : sTime;
                            let dObj = new Date(m.date); if(isNaN(dObj.getTime())) { let p = m.date.split('/'); if(p.length === 3) dObj = new Date(`${p[2]}-${p[1]}-${p[0]}`); } if(isNaN(dObj.getTime())) dObj = new Date();
                            let fYMD = `${dObj.getFullYear()}${String(dObj.getMonth()+1).padStart(2,'0')}${String(dObj.getDate()).padStart(2,'0')}`;
                            
                            const startDateTime = fYMD + 'T' + sTime; const endDateTime = fYMD + 'T' + eTime;
                            const calLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('ประชุม ' + m.type)}&dates=${startDateTime}/${endDateTime}&details=${encodeURIComponent(m.details + '\nหมายเหตุ: ' + m.note)}&ctz=Asia/Bangkok`;
                            const icsDetails = `${m.details || '-'}\nวงเงิน: ${m.budget ? Number(m.budget).toLocaleString() + ' บาท' : '-'}\nผู้เข้าร่วม: ${m.participants || '-'}\nหมายเหตุ: ${m.note || '-'}`;

                            html += `<div class="p-4 hover:bg-gray-50 border-b flex flex-col">
                                <div class="flex flex-col md:flex-row justify-between items-start no-print">
                                    <div class="w-full md:w-3/4">
                                        <p class="text-sm font-semibold text-gray-700 bg-gray-200 inline-block px-2 py-1 rounded mb-2">🕒 ${m.startTime} น. - ${m.endTime ? m.endTime + ' น.' : 'ไม่ระบุ'}</p>
                                        <div class="text-gray-800 text-sm space-y-1">
                                            <p><strong class="text-blue-700">📌 ประเภท:</strong> ${m.type}</p>
                                            <p><strong class="text-blue-700">📝 รายละเอียด:</strong> ${m.details || '-'}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-4 md:mt-0 w-full md:w-auto flex flex-col sm:flex-row gap-2 justify-end">
                                        <button onclick="viewMeetingDetails(${globalIndex})" class="w-full sm:w-auto text-center bg-gray-200 text-gray-800 hover:bg-gray-300 px-4 py-2 rounded-lg shadow-sm text-sm font-bold transition">🔍 ดูข้อมูล</button>
                                        <button onclick="downloadICS('ประชุม ${m.type}', '${m.date}', '${m.startTime}', '${m.endTime}', '${icsDetails}')" class="w-full sm:w-auto text-center bg-gray-100 border border-gray-300 text-gray-800 hover:bg-gray-200 px-4 py-2 rounded-lg shadow-sm text-sm font-bold transition">🍏 Apple/Outlook</button>
                                        <a href="${calLink}" target="_blank" class="w-full sm:w-auto text-center bg-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg shadow-sm text-sm font-bold transition">🔵 Google</a>
                                    </div>
                                </div>
                                
                                <div class="hidden print:block mt-2 text-sm text-gray-800 space-y-1 bg-white pt-2">
                                    <p><strong>🕒 เวลา:</strong> ${m.startTime} น. - ${m.endTime ? m.endTime + ' น.' : 'ไม่ระบุ'}</p>
                                    <p><strong>📌 ประเภท:</strong> ${m.type}</p>
                                    <p><strong>📝 รายละเอียด:</strong> ${m.details || '-'}</p>
                                    ${m.budget ? `<p><strong>💰 วงเงิน:</strong> ${Number(m.budget).toLocaleString()} บาท</p>` : ''}
                                    <p><strong>👥 ผู้เข้าร่วม:</strong> ${m.participants || '-'}</p>
                                    <p><strong>⚠️ หมายเหตุ:</strong> ${m.note || '-'}</p>
                                </div>
                            </div>`;
                            globalIndex++;
                        });
                    }
                    container.innerHTML = html;
                } else { container.innerHTML = `<div class="p-8 text-center text-gray-500 bg-gray-50 rounded">ไม่มีนัดหมายการประชุมในช่วงเวลาที่เลือก</div>`; }
            } catch(e) { container.innerHTML = `<div class="p-8 text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</div>`; }
        }

        function viewMeetingDetails(index) {
            const m = window.userMeetingData[index];
            if(!m) return;
            
            let budgetHtml = m.budget ? `<p class="mb-2"><strong class="text-blue-800">💰 วงเงิน:</strong> ${Number(m.budget).toLocaleString()} บาท</p>` : '';

            Swal.fire({
                title: 'รายละเอียดการประชุม',
                html: `<div class="text-left text-sm mt-4 bg-gray-50 p-4 rounded-lg border">
                    <p class="mb-2"><strong class="text-blue-800">📅 วันที่:</strong> ${m.displayDate || formatToDMMMYYYY(m.date)}</p>
                    <p class="mb-2"><strong class="text-blue-800">🕒 เวลา:</strong> ${m.startTime} น. - ${m.endTime ? m.endTime + ' น.' : 'ไม่ระบุ'}</p>
                    <p class="mb-2"><strong class="text-blue-800">📌 ประเภท:</strong> ${m.type}</p>
                    <p class="mb-2"><strong class="text-blue-800">📝 รายละเอียด:</strong> ${m.details || '-'}</p>
                    ${budgetHtml}
                    <p class="mb-2"><strong class="text-blue-800">👥 ผู้เข้าร่วม:</strong> ${m.participants || '-'}</p>
                    <p class="mb-2"><strong class="text-red-600">⚠️ หมายเหตุ:</strong> ${m.note || '-'}</p>
                </div>`,
                confirmButtonText: 'ปิด', confirmButtonColor: '#1e40af'
            });
        }
    </script>
</body>
