<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH Summary Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .hidden-page { display: none !important; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .print-area { width: 100%; border: none !important; box-shadow: none !important; }
            /* ป้องกันการตัดขาดครึ่งเวลาพิมพ์ */
            tr, img { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body class="pb-10">

    <nav id="navBar" class="p-4 shadow-md no-print text-white transition-colors duration-500">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span id="navIcon" class="text-2xl"></span>
                <span id="navTitle" class="font-bold text-lg tracking-tight"></span>
            </div>
            <div class="text-xs opacity-80">โรงพยาบาลกรุงเทพคริสเตียน</div>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-6 max-w-6xl">
        
        <div class="bg-white p-5 rounded-xl shadow-sm mb-6 no-print flex flex-col md:flex-row justify-between items-center gap-4 border border-gray-100">
            <div class="flex flex-col">
                <h2 id="contentTitle" class="text-xl font-bold italic"></h2>
                <p class="text-gray-500 text-xs mt-1">สรุปข้อมูลแบบไม่ต้องเข้าสู่ระบบ</p>
            </div>
            
            <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
                <select id="filterType" onchange="toggleDateInput()" class="border p-2 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="all">แสดงทั้งหมด</option>
                    <option value="daily">รายวัน</option>
                    <option value="monthly">รายเดือน</option>
                </select>
                
                <input type="date" id="dateTarget" class="border p-2 rounded-lg text-sm hidden-page outline-none focus:ring-2 focus:ring-blue-400">
                <input type="month" id="monthTarget" class="border p-2 rounded-lg text-sm hidden-page outline-none focus:ring-2 focus:ring-blue-400">
                
                <button onclick="fetchData()" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-bold text-sm shadow-sm transition">🔍 ค้นหา</button>
                <button onclick="window.print()" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition">🖨️ พิมพ์</button>
            </div>
        </div>

        <div id="printArea" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden min-h-[400px]">
            <div id="tableHeader" class="hidden print:block text-center p-6 border-b">
                <h1 class="text-2xl font-bold" id="printTitle"></h1>
                <p class="text-gray-600 mt-2" id="printSubtitle"></p>
            </div>
            
            <div id="dashboardResults" class="p-0">
                <div class="flex flex-col justify-center items-center h-64 text-gray-400">
                    <div class="animate-pulse mb-2 text-4xl">⏳</div>
                    <p class="italic">กำลังเตรียมข้อมูล...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ ส่วนตั้งค่า (แก้ไขตรงนี้)
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzSUxpY-Kv73916tdWRRgwI9qMqfPURWp2qbaou8vgEHk_fr3ekfIBk6dRz0BCcZPzoAQ/exec"; // <--- ใส่ URL Web App ของคุณ
        
        // เลือกประเภท: 'meeting', 'car', หรือ 'hotel'
        const PAGE_TYPE = 'meeting'; 
        // ==========================================

        window.dashboardDataTemp = [];
        window.dashboardColMap = {};

        const config = {
            meeting: {
                title: "สรุปการนัดประชุมกรรมการ", icon: "📝", color: "bg-blue-800", accent: "text-blue-800",
                indices: [1, 2, 3, 4, 5, 6, 7, 8],
                headers: ['วันที่', 'เริ่ม', 'จบ', 'ประเภท', 'รายละเอียด', 'วงเงิน (บาท)', 'ผู้เข้าร่วม', 'หมายเหตุ']
            },
            car: {
                title: "สรุปการจองรถรับ-ส่ง", icon: "🚐", color: "bg-green-700", accent: "text-green-700",
                indices: [1, 2, 3, 6, 4, 5, 7, 8],
                headers: ['วันที่ใช้รถ', 'เวลารับ', 'สถานที่รับ', 'สถานที่ส่ง', 'ผู้เดินทาง', 'จำนวนคน', 'เบอร์ติดต่อ', 'หมายเหตุ']
            },
            hotel: {
                title: "สรุปการจองห้องพัก", icon: "🏨", color: "bg-purple-700", accent: "text-purple-700",
                indices: [2, 5, 6, 3, 4, 7, 8], 
                headers: ['สถานที่พัก', 'วันเข้าพัก', 'วันออก', 'ผู้เข้าพัก', 'จำนวนคน', 'เบอร์ติดต่อ', 'หมายเหตุ']
            }
        };

        const current = config[PAGE_TYPE];

        window.onload = function() {
            document.title = current.title;
            document.getElementById('navTitle').innerText = current.title;
            document.getElementById('navIcon').innerText = current.icon;
            document.getElementById('navBar').classList.add(current.color);
            document.getElementById('contentTitle').innerText = current.title;
            document.getElementById('contentTitle').classList.add(current.accent);
            document.getElementById('printTitle').innerText = current.title;

            let today = new Date();
            let y = today.getFullYear();
            let m = String(today.getMonth() + 1).padStart(2, '0');
            let d = String(today.getDate()).padStart(2, '0');

            document.getElementById('dateTarget').value = `${y}-${m}-${d}`;
            document.getElementById('monthTarget').value = `${y}-${m}`;
            
            fetchData();
        }

        function formatToDMMMYYYY(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            let d = new Date(dateStr);
            if (isNaN(d.getTime())) {
                let parts = dateStr.split('/');
                if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
            }
            if (!isNaN(d.getTime())) {
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            }
            return dateStr;
        }

        function toggleDateInput() {
            const type = document.getElementById('filterType').value;
            document.getElementById('dateTarget').classList.add('hidden-page');
            document.getElementById('monthTarget').classList.add('hidden-page');
            if (type === 'daily') document.getElementById('dateTarget').classList.remove('hidden-page');
            else if (type === 'monthly') document.getElementById('monthTarget').classList.remove('hidden-page');
        }

        function showLargeImage(url) {
            Swal.fire({ imageUrl: url, imageAlt: 'Attached Image', width: '80%', showConfirmButton: false, showCloseButton: true });
        }

        function showRowDetails(rowIndex) {
            const row = window.dashboardDataTemp[rowIndex];
            const colMap = window.dashboardColMap;

            let html = '<div class="text-left text-sm mt-2 bg-gray-50 p-4 rounded-lg border space-y-2">';
            colMap.indices.forEach((idx, i) => {
                let val = row[idx] ? row[idx].toString() : '-';
                if (idx === 1 || (PAGE_TYPE === 'hotel' && (idx === 5 || idx === 6))) val = formatToDMMMYYYY(val);
                if (PAGE_TYPE === 'meeting' && idx === 6 && val !== '-') val = Number(val).toLocaleString() + ' บาท';
                
                html += `<p><strong class="text-gray-800">${colMap.headers[i]}:</strong> <span class="text-gray-600">${val}</span></p>`;
            });
            html += '</div>';

            Swal.fire({ title: current.title, html: html, confirmButtonText: 'ปิด', confirmButtonColor: '#1f2937' });
        }

        async function fetchData() {
            const fType = document.getElementById('filterType').value;
            let target = '';
            if (fType === 'daily') target = document.getElementById('dateTarget').value;
            if (fType === 'monthly') target = document.getElementById('monthTarget').value;
            
            let subText = "ข้อมูลทั้งหมด";
            if(fType === 'daily') subText = "ประจำวันที่: " + formatToDMMMYYYY(target);
            if(fType === 'monthly') subText = "ประจำเดือน: " + target;
            document.getElementById('printSubtitle').innerText = subText;

            Swal.fire({ title: 'กำลังโหลด...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getDashboardData', filterType: fType, targetDate: target }) 
                }).then(r => r.json());

                if (res.success) {
                    Swal.close();
                    renderTable(res.data[PAGE_TYPE]);
                } else {
                    Swal.fire('ผิดพลาด', res.message, 'error');
                }
            } catch(e) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อข้อมูลได้', 'error'); }
        }

        function renderTable(dataArray) {
            const container = document.getElementById('dashboardResults');
            if (dataArray.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-gray-400 italic">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</div>`;
                return;
            }

            window.dashboardColMap = { indices: current.indices, headers: current.headers };
            window.dashboardDataTemp = dataArray;

            let html = `
            <div class="p-4 bg-gray-50 border-b no-print lg:hidden text-center text-sm text-gray-500">
                💡 แตะที่รายการเพื่อดูรายละเอียดทั้งหมด
            </div>
            <div class="overflow-x-auto"><table class="min-w-full text-sm text-left">
                <thead class="bg-gray-100 text-gray-700 font-bold border-b"><tr>`;
            
            current.headers.forEach((h, i) => {
                // ซ่อนคอลัมน์ที่ 4 เป็นต้นไปในจอมือถือ แต่แสดงตอนพิมพ์
                let visibilityClass = i >= 3 ? 'hidden lg:table-cell print:table-cell' : 'table-cell';
                html += `<th class="px-5 py-4 ${visibilityClass}">${h}</th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-gray-200">`;

            dataArray.forEach((row, rowIndex) => {
                html += `<tr class="hover:bg-blue-50 cursor-pointer transition" onclick="showRowDetails(${rowIndex})">`;
                current.indices.forEach((idx, i) => {
                    let val = row[idx] ? row[idx].toString() : '-';
                    if (idx === 1 || (PAGE_TYPE === 'hotel' && (idx === 5 || idx === 6))) val = formatToDMMMYYYY(val);
                    if (PAGE_TYPE === 'meeting' && idx === 6 && val !== '-') val = Number(val).toLocaleString();
                    
                    let visibilityClass = i >= 3 ? 'hidden lg:table-cell print:table-cell' : 'table-cell';
                    html += `<td class="px-5 py-4 text-gray-700 ${visibilityClass}">${val.substring(0, 100)}${val.length > 100 ? '...' : ''}</td>`;
                });
                html += `</tr>`;

                // จัดการรูปภาพของรถ
                if (PAGE_TYPE === 'car' && row[9] && row[9].toString().startsWith('http')) {
                    html += `<tr>
                        <td colspan="${current.headers.length}" class="p-0 border-b border-gray-300 bg-gray-50">
                            <img src="${row[9]}" alt="Car Attach" class="w-full object-contain max-h-[400px] cursor-pointer no-print" onclick="showLargeImage('${row[9]}'); event.stopPropagation();">
                            <img src="${row[9]}" alt="Car Attach" class="w-full object-contain hidden print:block">
                        </td>
                    </tr>`;
                }
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
